services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: painel_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - painel_network
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: painel_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - painel_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: painel_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: painel_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: painel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - painel_db_data:/var/lib/mysql
    networks:
      - painel_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  painel_network:
    driver: bridge

volumes:
  painel_db_data:
